services:
  - type: web
    name: solara-piscina-ia
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_REAL_IMAGE_GENERATION
        value: "0"
      - key: LEAD_STORE_MODE
        value: supabase
      - key: STORAGE_MODE
        value: supabase
      - key: REQUIRE_PERSISTENT_STORAGE
        value: "1"
      - key: SUPABASE_STORAGE_BUCKET
        value: solara-lead-photos
      - key: SUPABASE_LEADS_TABLE
        value: solara_leads
      - key: ADMIN_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false





